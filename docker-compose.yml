version: '3.9'

services:

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"

  ai-service:
    build:
      context: ./ai-service
    container_name: ai-service
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - qdrant
    env_file:
      - .env
    volumes:
      - ./datasets/enterprise-docs:/data